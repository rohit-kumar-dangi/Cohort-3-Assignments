<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Pokemon</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="container">

        <div id="left-section">
            <div id="left-top">
                <img id="picachu-logo" src="images/picachu_logo.png" alt="picachu">
            </div>

            <div id="left-center">
                <div id="subtitle">POKEMON GEN I</div>
                <div id="title">Pikachu</div>
                <div id="description">
                    Pikachu is an Electric-type Pokémon introduced <br>in Generation I.
                    Pikachu are small, chubby, <br>and incredibly cute mouse-like Pokémon.<br>
                    They are almost completely covered by <br>yellow fur.
                </div>
                <div id="counter">
                    <div id="line"></div>
                    <span>01 / 08</span>
                </div>
            </div>

            <div id="left-bottom">
                <img src="images/ball.png" alt="Picachu ball" id="picachu_ball">
            </div>

        </div>

        <img id="pikachu" src="images/picachu.png" alt="Pikachu">

        <div id="right-section">
            <div id="right-top">
                <img id="menu" src="images/menu.png" alt="menu">
            </div>
            <div id="slider-dots">
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>
</body>
</html>
