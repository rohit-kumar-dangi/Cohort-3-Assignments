<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Task Manager</title>
</head>
<body>

    <main>

        <header>
            <h1>Task Manager</h1>
        </header>

        <div class="task_detail">
            <div class="task_search">
                <input type="text" placeholder="Search tasks">
            </div>
            <div class="task_progress">
                <div class="total_task">
                    <h3>Total</h3>
                    <p>1</p>
                </div>
                <div class="completed_task">
                    <h3>Completed</h3>
                    <p>0</p>
                </div>
                <div class="pending_task">
                    <h3>Pending</h3>
                    <p>1</p>
                </div>
            </div>
        </div>

        <div class="tasks">

            <div class="tasks_heading">
                <h2>Your Tasks</h2>
            </div>

            <div class="tasks_container">

                <div class="task">
                    <div class="task_name">
                        <p>Dom</p>
                    </div>
                    <div class="task_option">
                        <button id="delete_btn">Delete</button>
                        <button id="edit_btn">Edit</button>
                        <button id="Complete_btn">Complete</button>
                    </div>
                </div>

            </div>

        </div>
        <footer></footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
