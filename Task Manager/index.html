<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="style.css">
    <title>Task Manager</title>
</head>
<body>

    <main>

        <header>
            <h1>Task Manager</h1>
            <button id="add_task" onclick="showAddTask()">Add</button>
        </header>

        <div class="task_detail">
            <div class="task_search">
                <input id="search_task" onchange="taskSearching" type="text" placeholder="Search tasks">
            </div>
            <div class="task_progress">
                <div class="total_task">
                    <h3>Total</h3>
                    <p id="totaltask">1</p>
                </div>
                <div class="completed_task">
                    <h3>Completed</h3>
                    <p id="completedtask">0</p>
                </div>
                <div class="pending_task">
                    <h3>Pending</h3>
                    <p id="pendingtask">1</p>
                </div>
            </div>
        </div>

        <div class="tasks">

            <div class="tasks_heading">
                <h2>Your Tasks</h2>
            </div>

            <div class="tasks_container">



            </div>

        </div>
        <footer></footer>

    </main>

    <div class="add_task">
        <div class="close">
            <img src="images/close.png" alt="x">
        </div>
        <form class="add_form">
            <h1>Add Task</h1>
            <div class="task_input">
                <input type="text">
                <button class="btn" onclick="addData()">+ Add Task</button>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
