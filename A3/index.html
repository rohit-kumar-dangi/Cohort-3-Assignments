<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A3</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="dot" id="dot1" ></div>
    <div class="dot" id="dot2" ></div>
    <div class="dot" id="dot3" ></div>
    <div class="dot" id="dot4" ></div>
    <div class="dot" id="dot5" ></div>
    <div class="dot" id="dot6" ></div>

    <main class="container">
        <header class="header">
            <h2>Explore Art Work</h2>
            <a href="#">See All</a>
        </header>

        <section class="cards">
            <div class="card">
                <img src="images/Monocular.png" alt="Monocular" />
                <div class="card-info">
                    <div>Monocular</div>
                    <div class="likes"><span>54.8k</span> <i class="ri-heart-line"></i></div>
                </div>
                <button>Place Bid</button>
            </div>

            <div class="card">
                <img src="images/Horns Mask.png" alt="Horns Mask" />
                <div class="card-info">
                    <div>Horns Mask</div>
                    <div class="likes"><span>32.4k</span> <i class="ri-heart-line"></i></div>
                </div>
                <button>Place Bid</button>
            </div>

            <div class="card">
                <img src="images/Light Moon.png" alt="Light Moon" />
                <div class="card-info">
                    <div>Light Moon</div>
                    <div class="likes"><span>86.6k</span> <i class="ri-heart-line"></i></div>
                </div>
                <button>Place Bid</button>
            </div>
            
            <div class="card">
                <img src="images/Skull Wire.png" alt="Skull Wire" />
                <div class="card-info">
                    <div>Skull Wire</div>
                    <div class="likes"><span>78.9k</span> <i class="ri-heart-line"></i></div>
                </div>
                <button>Place Bid</button>
            </div>

            <div class="card">
                <img src="images/Spiderman.png" alt="Spiderman" />
                <div class="card-info">
                    <div>Spiderman</div>
                    <div class="likes"><span>24.8k</span> <i class="ri-heart-line"></i></div>
                </div>
                <button>Place Bid</button>
            </div>

            <div class="card">
                <img src="images/DeadPool.png" alt="DeadPool" />
                <div class="card-info">
                    <div>DeadPool</div>
                    <div class="likes"><span>59.7k</span> <i class="ri-heart-line"></i></div>
                </div>
                <button>Place Bid</button>
            </div>

            <div class="card">
                <img src="images/White Eye.png" alt="White Eye" />
                <div class="card-info">
                    <div>White Eye</div>
                    <div class="likes"><span>45.7k</span> <i class="ri-heart-line"></i></div>
                </div>
                <button>Place Bid</button>
            </div>

            <div class="card">
                <img src="images/Plastic Spinal.png" alt="Plastic Spinal" />
                <div class="card-info">
                    <div>Plastic Spinal</div>
                    <div class="likes"><span>98.6k</span> <i class="ri-heart-line"></i></div>
                </div>
                <button>Place Bid</button>
            </div>
        </section>
    </main>
</body>
</html>
