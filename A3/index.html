<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A3</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="dot dot-1"></div>
    <div class="dot dot-2"></div>
    <div class="dot dot-3"></div>
    <div class="dot dot-4"></div>
    <div class="dot dot-5"></div>
    <div class="dot dot-6"></div>

    <main class="container">
        <header class="header">
            <h2>Explore Art Work</h2>
            <a href="#">See All</a>
        </header>

        <section class="cards">
            <div class="card">
                <img src="images/Monocular.png" alt="Monocular" />
                <div class="card-info">
                    <span>Monocular</span>
                    <span class="likes">54.8k <i class="ri-heart-line"></i></span>
                </div>
                <button>Place Bid</button>
            </div>

            <div class="card">
                <img src="images/Horns Mask.png" alt="Horns Mask" />
                <div class="card-info">
                    <span>Horns Mask</span>
                    <span class="likes">32.4k <i class="ri-heart-line"></i></span>
                </div>
                <button>Place Bid</button>
            </div>

            <div class="card">
                <img src="images/Light Moon.png" alt="Light Moon" />
                <div class="card-info">
                    <span>Light Moon</span>
                    <span class="likes">86.6k <i class="ri-heart-line"></i></span>
                </div>
                <button>Place Bid</button>
            </div>
            
            <div class="card">
                <img src="images/Skull Wire.png" alt="Skull Wire" />
                <div class="card-info">
                    <span>Skull Wire</span>
                    <span class="likes">78.9k <i class="ri-heart-line"></i></span>
                </div>
                <button>Place Bid</button>
            </div>

            <div class="card">
                <img src="images/Spiderman.png" alt="Spiderman" />
                <div class="card-info">
                    <span>Spiderman</span>
                    <span class="likes">24.8k <i class="ri-heart-line"></i></span>
                </div>
                <button>Place Bid</button>
            </div>

            <div class="card">
                <img src="images/DeadPool.png" alt="DeadPool" />
                <div class="card-info">
                    <span>DeadPool</span>
                    <span class="likes">59.7k <i class="ri-heart-line"></i></span>
                </div>
                <button>Place Bid</button>
            </div>

            <div class="card">
                <img src="images/White Eye.png" alt="White Eye" />
                <div class="card-info">
                    <span>White Eye</span>
                    <span class="likes">45.7k <i class="ri-heart-line"></i></span>
                </div>
                <button>Place Bid</button>
            </div>

            <div class="card">
                <img src="images/Plastic Spinal.png" alt="Plastic Spinal" />
                <div class="card-info">
                    <span>Plastic Spinal</span>
                    <span class="likes">98.6k <i class="ri-heart-line"></i></span>
                </div>
                <button>Place Bid</button>
            </div>
        </section>
    </main>
</body>
</html>
